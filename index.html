<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Websites | Premium Development</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=AbvoNQiduLHQzN2OpamkoIUbGPPMLCjiiIWabtl3UZ-wMY4IuWnNcT1KtPG65JbNfMLDXFwoIMleQGfR&vault=true&intent=subscription" data-sdk-integration-source="button-factory"></script>
    
    <style>
        :root {
            --bg: #05070a;
            --accent: #00d2ff;
            --accent-light: #87ceeb;
            --accent-glow: rgba(135, 206, 235, 0.4);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --error: #ff4d4d;
            /* Gradient Variable */
            --text-gradient: linear-gradient(135deg, #ffffff 30%, #87ceeb 100%);
        }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 210, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(135, 206, 235, 0.08) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Gradient Text Utility */
        .gradient-text {
            background: var(--text-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
        }

        nav { 
            width: 100%; padding: 2rem; display: flex; flex-direction: column; align-items: center; gap: 1.5rem;
            animation: fadeInDown 0.8s ease;
        }

        .nav-container { display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s; }
        .nav-logo-img { 
            height: 100px; 
            filter: drop-shadow(0 0 20px var(--accent-glow)); 
            border-radius: 20px; 
        }

        .support-btn { 
            background: var(--glass); border: 1px solid var(--glass-border); color: white; 
            padding: 8px 24px; border-radius: 50px; cursor: pointer; transition: 0.3s; 
        }
        .support-btn:hover { background: var(--accent-light); color: #000; box-shadow: 0 0 20px var(--accent-glow); transform: translateY(-2px); }

        .page-view { width: 100%; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        .hidden { display: none; }

        header { text-align: center; padding: 2rem 1rem; animation: fadeInUp 0.8s ease; }
        header h1 { font-size: 3.5rem; letter-spacing: -2px; margin-bottom: 0.5rem; font-weight: 800; }

        .billing-toggle {
            display: flex; background: var(--glass); border: 1px solid var(--glass-border);
            padding: 4px; border-radius: 50px; margin-bottom: 2rem; width: fit-content;
        }
        .toggle-opt {
            padding: 8px 20px; border-radius: 50px; cursor: pointer; font-size: 0.9rem; transition: 0.3s;
            color: var(--text-dim); font-weight: 600;
        }
        .toggle-opt.active { background: var(--accent-light); color: #000; }

        .glass-card { 
            background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); 
            border-radius: 24px; padding: 2.5rem; width: 92%; max-width: 600px;
            animation: fadeInUp 1s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .tier-selection-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 2rem; }
        .tier-card { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); 
            padding: 1.2rem 0.5rem; border-radius: 16px; text-align: center; cursor: pointer; transition: 0.4s; 
        }
        .tier-card.selected { border-color: var(--accent-light); background: rgba(135, 206, 235, 0.1); box-shadow: 0 0 15px var(--accent-glow); }
        .tier-card.selected b { background: var(--text-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .input-wrapper { margin-bottom: 1.5rem; }
        input, textarea { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); 
            border-radius: 12px; padding: 1rem; color: white; transition: 0.3s; font-size: 16px;
        }
        input:focus, textarea:focus { border-color: var(--accent-light); outline: none; background: rgba(255,255,255,0.08); }

        #paypal-button-container { transition: 0.3s; opacity: 0.4; pointer-events: none; margin-top: 1.5rem; }
        #paypal-button-container.active { opacity: 1; pointer-events: auto; }

        .submit-btn { 
            width: 100%; padding: 1rem; border-radius: 12px; border: none; 
            background: var(--accent-light); color: #000; font-weight: 800; cursor: pointer; transition: 0.3s; 
        }

        @media (max-width: 600px) {
            .tier-selection-grid { grid-template-columns: 1fr; }
            header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container" onclick="showPage('main-page')">
            <img src="https://cdn.discordapp.com/attachments/1101409428944724000/1501626773056520413/ChatGPT_Image_May_5_2026_05_15_21_PM.png?ex=69fd6b29&is=69fc19a9&hm=36f8adee7102fb1f826975352a95257e7d2c60064701f8f7223a9f06032103e5&" alt="OG Websites" class="nav-logo-img">
            <div class="gradient-text" style="font-weight:800; font-size:1.8rem; letter-spacing: 3px;">OG WEBSITES</div>
        </div>
        <button class="support-btn" onclick="toggleSupport()">Contact Support</button>
    </nav>

    <main id="main-page" class="page-view">
        <header>
            <h1 class="gradient-text">Scale Your Brand</h1>
            <p style="color: var(--text-dim)">Professional Web Development Solutions</p>
        </header>

        <div class="billing-toggle">
            <div class="toggle-opt active" id="btn-monthly" onclick="setBilling('monthly')">Monthly</div>
            <div class="toggle-opt" id="btn-yearly" onclick="setBilling('yearly')">Yearly <span style="color: #00ff88; font-size: 0.7rem;">-20%</span></div>
        </div>

        <div class="glass-card">
            <form id="orderForm">
                <div class="tier-selection-grid">
                    <div class="tier-card selected" onclick="selectTier('Basic', this)">
                        <b>Basic</b><br><span class="price-label" style="color: var(--accent-light)">$19.99</span>
                    </div>
                    <div class="tier-card" onclick="selectTier('Advanced', this)">
                        <b>Advanced</b><br><span class="price-label" style="color: var(--accent-light)">$39.99</span>
                    </div>
                    <div class="tier-card" onclick="selectTier('Premium', this)">
                        <b>Premium</b><br><span class="price-label" style="color: var(--accent-light)">$79.99</span>
                    </div>
                </div>

                <div class="input-wrapper">
                    <input type="text" id="clientName" placeholder="Full Name" oninput="checkSilentValidation()">
                </div>
                <div class="input-wrapper">
                    <input type="email" id="clientEmail" placeholder="Gmail Address" oninput="checkSilentValidation()">
                </div>
                <div class="input-wrapper">
                    <textarea id="projectDetails" rows="3" placeholder="Describe your vision..." oninput="checkSilentValidation()"></textarea>
                </div>

                <div id="paypal-button-container"></div>
            </form>
        </div>
    </main>

    <main id="support-page" class="page-view hidden">
        <header><h1 class="gradient-text">Support Center</h1></header>
        <div class="glass-card">
            <form onsubmit="sendSupportMessage(event)">
                <input type="text" id="supportProjectName" placeholder="Project Name" style="margin-bottom:1rem" required>
                <input type="email" id="supportEmail" placeholder="Gmail Address" style="margin-bottom:1rem" required>
                <textarea id="supportDescription" rows="5" placeholder="How can we help?" style="margin-bottom:1.5rem" required></textarea>
                <button type="submit" class="submit-btn">Submit Ticket</button>
            </form>
        </div>
    </main>

    <script>
        const ORDER_WEBHOOK = "https://discord.com/api/webhooks/1501632580058091570/OHmK0Vr6ZqpfQ5RtS9obRk6ulU5fj_L8xr_80LI9vlSKgmXV1FHIHDZEHRqG4iouNdPQ";
        const SUPPORT_WEBHOOK = "https://discord.com/api/webhooks/1501632588157288458/9TThDm--A1c1LD2kDodKSvATT4ZikRc8lfPiUrhLbaStTLeqQvIrwEnosMtV91n8BXLb";
        
        let currentTier = 'Basic';
        let billingCycle = 'monthly';

        function setBilling(cycle) {
            billingCycle = cycle;
            document.getElementById('btn-monthly').classList.toggle('active', cycle === 'monthly');
            document.getElementById('btn-yearly').classList.toggle('active', cycle === 'yearly');
            const prices = { monthly: ['$19.99', '$39.99', '$79.99'], yearly: ['$59.99/yr', '$119.99/yr', '$159.99/yr'] };
            document.querySelectorAll('.price-label').forEach((el, i) => { el.innerText = prices[cycle][i]; });
        }

        function showPage(id) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function toggleSupport() {
            const isSupport = !document.getElementById('support-page').classList.contains('hidden');
            showPage(isSupport ? 'main-page' : 'support-page');
        }

        function selectTier(t, el) {
            currentTier = t;
            document.querySelectorAll('.tier-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }

        function checkSilentValidation() {
            const name = document.getElementById('clientName').value.trim();
            const email = document.getElementById('clientEmail').value.trim();
            const details = document.getElementById('projectDetails').value.trim();
            if (name.length > 1 && email.includes('@') && details.length > 5) {
                document.getElementById('paypal-button-container').classList.add('active');
            }
        }

        paypal.Buttons({
            createSubscription: function(data, actions) {
                const planIds = {
                    monthly: { Basic: "P-69P3981420001113SNH5YMUI", Advanced: "P-3XB82390WU7228036NH5Y2IQ", Premium: "P-3W021136F9626704VNH5Y3QI" },
                    yearly: { Basic: "YOUR_YEARLY_ID", Advanced: "YOUR_YEARLY_ID", Premium: "YOUR_YEARLY_ID" }
                };
                return actions.subscription.create({ 'plan_id': planIds[billingCycle][currentTier] });
            },
            onApprove: function(data, actions) {
                const payload = { embeds: [{ title: "💰 NEW ORDER", color: 5763719, fields: [{ name: "Client", value: document.getElementById('clientName').value }, { name: "Tier", value: `${currentTier} (${billingCycle})` }] }] };
                fetch(ORDER_WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)});
                alert("Order Successful!");
            }
        }).render('#paypal-button-container');
    </script>
</body>
</html>
