<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Websites | Premium Development</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <script src="https://www.paypal.com/sdk/js?client-id=AbvoNQiduLHQzN2OpamkoIUbGPPMLCjiiIWabtl3UZ-wMY4IuWnNcT1KtPG65JbNfMLDXFwoIMleQGfR&vault=true&intent=subscription"></script>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("NFfpza5ndHKX5cbbw"); 
        })();
    </script>

    <style>
        :root{
            --bg:#05070a;
            --accent:#00d2ff;
            --accent-light:#87ceeb;
            --accent-glow:rgba(135,206,235,0.4);
            --glass:rgba(255,255,255,0.03);
            --glass-border:rgba(255,255,255,0.08);
            --text-main:#fff;
            --text-dim:#94a3b8;
            --text-gradient:linear-gradient(135deg,#fff 30%,#87ceeb 100%);
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Plus Jakarta Sans',sans-serif;
        }

        body{
            background-color:var(--bg);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(0,210,255,0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(135,206,235,0.08) 0%, transparent 40%);
            color:var(--text-main);
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            overflow-x: hidden;
        }

        @keyframes fadeInDown{
            from{opacity:0;transform:translateY(-20px);}
            to{opacity:1;transform:translateY(0);}
        }

        @keyframes fadeInUp{
            from{opacity:0;transform:translateY(20px);}
            to{opacity:1;transform:translateY(0);}
        }

        .gradient-text{
            background:var(--text-gradient);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
        }

        nav{
            width:100%;
            padding:2rem;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:1.5rem;
            animation:fadeInDown .8s ease;
        }

        .nav-container{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:12px;
            cursor:pointer;
        }

        .nav-logo-img{
            height:100px;
            border-radius:20px;
            filter:drop-shadow(0 0 20px var(--accent-glow));
            transition: transform 0.3s ease;
        }

        .nav-container:hover .nav-logo-img{
            transform: scale(1.05);
        }

        .nav-buttons{
            display:flex;
            gap:.8rem;
            flex-wrap:wrap;
            justify-content:center;
        }

        .btn-secondary{
            background:var(--glass);
            border:1px solid var(--glass-border);
            color:#fff;
            padding:8px 20px;
            border-radius:50px;
            cursor:pointer;
            transition:.3s;
            display:flex;
            align-items:center;
            gap:8px;
            height:40px;
        }

        .btn-secondary:hover{
            background:var(--accent-light);
            color:#000;
            transform:translateY(-2px);
            box-shadow:0 0 20px var(--accent-glow);
        }

        .btn-secondary img{
            height:18px;
            width:18px;
            filter:invert(1);
        }

        .btn-secondary:hover img{
            filter:invert(0);
        }

        .page-view{
            width:100%;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding-bottom:50px;
        }

        .hidden{
            display:none !important;
        }

        header{
            text-align:center;
            padding:2rem 1rem;
            animation:fadeInUp .8s ease;
        }

        header h1{
            font-size:3.5rem;
            letter-spacing:-2px;
            margin-bottom:.5rem;
            font-weight:800;
        }

        .billing-toggle{
            display:flex;
            background:var(--glass);
            border:1px solid var(--glass-border);
            padding:4px;
            border-radius:50px;
            margin-bottom:1rem;
        }

        .toggle-opt{
            padding:8px 20px;
            border-radius:50px;
            cursor:pointer;
            transition:.3s;
            color:var(--text-dim);
            font-weight:600;
        }

        .toggle-opt.active{
            background:var(--accent-light);
            color:#000;
        }

        .glass-card{
            background:var(--glass);
            backdrop-filter:blur(10px);
            border:1px solid var(--glass-border);
            border-radius:24px;
            padding:2.5rem;
            width:92%;
            max-width:600px;
            animation:fadeInUp 1s ease;
            box-shadow:0 10px 30px rgba(0,0,0,.5);
        }

        .tier-selection-grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:12px;
            margin-bottom:2rem;
        }

        .tier-card{
            background:rgba(255,255,255,.02);
            border:1px solid var(--glass-border);
            padding:1.2rem .5rem;
            border-radius:16px;
            text-align:center;
            cursor:pointer;
            transition:.4s;
        }

        .tier-card.selected{
            border-color:var(--accent-light);
            background:rgba(135,206,235,.1);
            box-shadow:0 0 15px var(--accent-glow);
        }

        .compare-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .compare-group {
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1.5rem;
        }

        .compare-group:last-child {
            border-bottom: none;
        }

        .compare-header {
            color: var(--accent-light);
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .compare-row {
            display: grid;
            grid-template-columns: 100px 1fr;
            padding: 8px 0;
            align-items: center;
        }

        .compare-label {
            color: #fff;
            font-weight: 600;
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .compare-value {
            color: var(--text-dim);
            font-size: 0.95rem;
            text-align: right;
        }

        .input-wrapper{
            margin-bottom:1.5rem;
            position: relative;
        }

        input,
        textarea{
            width:100%;
            background:rgba(255,255,255,.05);
            border:1px solid var(--glass-border);
            border-radius:12px;
            padding:1rem;
            color:#fff;
            transition:.3s;
            font-size:16px;
        }

        textarea{
            resize:none;
        }

        input:focus,
        textarea:focus{
            border-color:var(--accent-light);
            outline:none;
            background:rgba(255,255,255,.08);
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
            padding: 5px;
        }

        #paypal-button-container{
            transition:.3s;
            opacity:.4;
            pointer-events:none;
            margin-top:1.5rem;
        }

        #paypal-button-container.active{
            opacity:1;
            pointer-events:auto;
        }

        .submit-btn{
            width:100%;
            padding:1rem;
            border-radius:12px;
            border:none;
            background:var(--accent-light);
            color:#000;
            font-weight:800;
            cursor:pointer;
            transition:.3s;
        }

        .submit-btn:hover{
            transform:translateY(-2px);
        }

        .auth-status{
            text-align:center;
            margin-top:1rem;
            color:var(--accent-light);
            font-size: 0.9rem;
        }
        
        #authLink {
            color: var(--accent-light);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .auth-divider {
            text-align:center; 
            margin: 1.5rem 0; 
            color: var(--text-dim); 
            font-size: 0.8rem; 
            position: relative;
        }
        .auth-divider span {
            background: #0d1117; 
            padding: 0 10px; 
            position: relative; 
            z-index: 1;
        }
        .auth-divider hr {
            position: absolute; 
            top: 50%; 
            width: 100%; 
            border: 0; 
            border-top: 1px solid var(--glass-border); 
            z-index: 0;
        }

        .cancel-sub-btn{
            display:none;
            margin-top:1rem;
            background: #ff4d4d !important;
            color: white !important;
        }

        .projects-grid{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            margin-top: 2rem;
            width: 92%;
            max-width: 1200px;
        }

        .project-card{
            overflow:hidden;
            border-radius:24px;
            border:1px solid var(--glass-border);
            background:var(--glass);
            transition:.4s;
            width: 100%;
            max-width: 500px;
            height: 650px;
        }

        @media(max-width:600px){
            .tier-selection-grid{grid-template-columns:1fr;}
            header h1{font-size:2.5rem;}
            .project-card {height: 400px;}
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-container" onclick="showPage('main-page')">
        <img src="https://i.postimg.cc/k5KcZgbm/OG-logo.png" class="nav-logo-img" alt="OG Websites Logo">
        <div class="gradient-text" style="font-weight:800;font-size:1.8rem;letter-spacing:3px;">WEBSITES</div>
    </div>

    <div class="nav-buttons">
        <button class="btn-secondary" onclick="showPage('main-page')">Home</button>
        <button class="btn-secondary" onclick="showPage('projects-page')">Our Projects</button>
        <button class="btn-secondary" onclick="showPage('details-page')">Compare Plans</button>
        <button class="btn-secondary" onclick="showPage('support-page')">Support</button>
        <button class="btn-secondary" id="nav-auth-btn" onclick="showPage('auth-page')">Login / Sign Up</button>
        <button class="btn-secondary hidden" id="nav-profile-btn" onclick="showPage('profile-page')">Profile</button>
    </div>
</nav>

<main id="main-page" class="page-view">
    <header>
        <h1 class="gradient-text">Scale Your Brand</h1>
        <p style="color:var(--text-dim)">Professional Web Development Solutions</p>
    </header>

    <div class="billing-toggle">
        <div class="toggle-opt active" id="btn-monthly" onclick="setBilling('monthly')">Monthly</div>
        <div class="toggle-opt" id="btn-yearly" onclick="setBilling('yearly')">Yearly <span style="color:#00ff88;font-size:.7rem;">-20%</span></div>
    </div>

    <div class="glass-card">
        <form id="orderForm">
            <div class="tier-selection-grid">
                <div class="tier-card selected" onclick="selectTier('Basic',this)"><b>Basic</b><br><span class="price-label" style="color:var(--accent-light)">$19.99</span></div>
                <div class="tier-card" onclick="selectTier('Advanced',this)"><b>Advanced</b><br><span class="price-label" style="color:var(--accent-light)">$39.99</span></div>
                <div class="tier-card" onclick="selectTier('Premium',this)"><b>Premium</b><br><span class="price-label" style="color:var(--accent-light)">$79.99</span></div>
            </div>

            <div class="input-wrapper"><input type="text" id="clientName" placeholder="Full Name" oninput="checkSilentValidation()"></div>
            <div class="input-wrapper"><input type="email" id="clientEmail" placeholder="Gmail Address" oninput="checkSilentValidation()"></div>
            <div class="input-wrapper"><input type="text" id="clientDiscord" placeholder="Discord Username (Optional)" oninput="checkSilentValidation()"></div>
            <div class="input-wrapper"><textarea id="projectDetails" rows="3" placeholder="Describe your vision..." oninput="checkSilentValidation()"></textarea></div>

            <div id="paypal-button-container"></div>
            <div class="auth-status" id="authStatus">
                <a id="authLink" onclick="showPage('auth-page')">Please log in to purchase</a>
            </div>
        </form>
    </div>
</main>

<main id="projects-page" class="page-view hidden">
    <header><h1 class="gradient-text">Our Projects</h1></header>
    <div class="projects-grid" id="projects-gallery"></div>
</main>

<main id="auth-page" class="page-view hidden">
    <header><h1 class="gradient-text">Account Access</h1></header>
    <div class="glass-card">
        <div id="auth-inputs-container">
            <div class="input-wrapper"><input type="email" id="authEmail" placeholder="Gmail Address (@gmail.com)"></div>
            <div class="input-wrapper">
                <input type="password" id="authPassword" placeholder="Password (min. 6 chars)">
                <button type="button" class="password-toggle" onclick="togglePass('authPassword')">SHOW</button>
            </div>
            <button class="submit-btn" style="margin-bottom:1rem;" onclick="signupUser()">Sign Up</button>
            <button class="submit-btn" onclick="loginUser()">Login</button>
            <div class="auth-divider"><span>OR</span><hr></div>
            <button class="submit-btn" style="background:#fff;color:#000;" onclick="loginWithGoogle()">Continue with Google</button>
        </div>
    </div>
</main>

<main id="profile-page" class="page-view hidden">
    <header><h1 class="gradient-text">Your Profile</h1></header>
    <div class="glass-card" style="text-align: center;">
        <h3 id="displayEmail" style="color:#fff;">Email</h3>
        <p id="displayUid" style="color:var(--text-dim);font-size:0.8rem;margin-bottom:2rem;">UID</p>
        <button class="submit-btn" style="background:rgba(255,77,77,0.1);color:#ff4d4d;border:1px solid #ff4d4d" onclick="logoutUser()">Logout</button>
    </div>
</main>

<script>
    // --- NON-MODULE HELPERS ---
    function showPage(id){
        document.querySelectorAll('.page-view').forEach(p=>p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function togglePass(id){
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    let currentTier = 'Basic';
    let billingCycle = 'monthly';

    function setBilling(cycle){
        billingCycle = cycle;
        document.getElementById('btn-monthly').classList.toggle('active', cycle === 'monthly');
        document.getElementById('btn-yearly').classList.toggle('active', cycle === 'yearly');
        const prices = cycle === 'monthly' ? ['$19.99','$39.99','$79.99'] : ['$59.99/yr','$119.99/yr','$159.99/yr'];
        document.querySelectorAll('.price-label').forEach((el,i)=> el.innerText = prices[i]);
    }

    function selectTier(tier,el){
        currentTier = tier;
        document.querySelectorAll('.tier-card').forEach(c=>c.classList.remove('selected'));
        el.classList.add('selected');
    }

    function checkSilentValidation(){
        const name = document.getElementById('clientName').value.trim();
        const email = document.getElementById('clientEmail').value.trim();
        const details = document.getElementById('projectDetails').value.trim();
        const authStatus = document.getElementById('authStatus');
        
        if(name.length > 1 && email.includes('@') && details.length > 5 && window.currentUser){
            document.getElementById('paypal-button-container').classList.add('active');
            authStatus.innerText = "Logged in as " + window.currentUser.email;
        } else {
            document.getElementById('paypal-button-container').classList.remove('active');
            authStatus.innerHTML = window.currentUser ? "Complete fields to enable PayPal" : `<a id="authLink" onclick="showPage('auth-page')">Please log in to purchase</a>`;
        }
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { 
        getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, 
        signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAvDL798yfZgVaj-Gpj3C38CMpVsKZpj2I",
        authDomain: "og-web-16fd3.firebaseapp.com",
        projectId: "og-web-16fd3",
        storageBucket: "og-web-16fd3.firebasestorage.app",
        messagingSenderId: "573418258528",
        appId: "1:573418258528:web:97a57ebe52039773b4c305"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // EXPOSE TO WINDOW
    window.signupUser = async () => {
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value;

        if(!email.endsWith('@gmail.com')){ alert("Gmail only."); return; }
        if(password.length < 6){ alert("Password too short."); return; }

        try {
            await createUserWithEmailAndPassword(auth, email, password);
            alert("Account Created!");
            showPage('main-page');
        } catch (e) {
            if(e.code === 'auth/email-already-in-use'){
                alert("Account already exists. Please login.");
            } else {
                alert(e.message);
            }
        }
    };

    window.loginUser = async () => {
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value;
        try {
            await signInWithEmailAndPassword(auth, email, password);
            showPage('main-page');
        } catch (e) { alert("Invalid credentials."); }
    };

    window.loginWithGoogle = async () => {
        try {
            await signInWithPopup(auth, provider);
            showPage('main-page');
        } catch (e) { alert("Google login failed."); }
    };

    window.logoutUser = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, (user) => {
        window.currentUser = user;
        document.getElementById('nav-auth-btn').classList.toggle('hidden', !!user);
        document.getElementById('nav-profile-btn').classList.toggle('hidden', !user);
        if(user){
            document.getElementById('displayEmail').innerText = user.email;
            document.getElementById('displayUid').innerText = "UID: " + user.uid;
        }
        checkSilentValidation();
    });
</script>

<script>
    // PayPal Integration
    paypal.Buttons({
        createSubscription: (data, actions) => {
            const plans = {
                monthly: { Basic:"P-69P3981420001113SNH5YMUI", Advanced:"P-3XB82390WU7228036NH5Y2IQ", Premium:"P-3W021136F9626704VNH5Y3QI" },
                yearly: { Basic:"P-99C129587B2750623NH6J6IA", Advanced:"P-52M46233MR674514ENH6J75I", Premium:"P-6U140429FU673050NNH6KBBQ" }
            };
            return actions.subscription.create({'plan_id': plans[billingCycle][currentTier]});
        },
        onApprove: (data) => alert("Payment Successful! ID: " + data.subscriptionID)
    }).render('#paypal-button-container');
</script>

</body>
</html>
