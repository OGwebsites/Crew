<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import { 
        getAuth,
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        signInWithPopup,
        GoogleAuthProvider,
        signOut,
        onAuthStateChanged,
        updatePassword,
        fetchSignInMethodsForEmail
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAvDL798yfZgVaj-Gpj3C38CMpVsKZpj2I",
        authDomain: "og-web-16fd3.firebaseapp.com",
        projectId: "og-web-16fd3",
        storageBucket: "og-web-16fd3.firebasestorage.app",
        messagingSenderId: "573418258528",
        appId: "1:573418258528:web:97a57ebe52039773b4c305"
    };

    const app = initializeApp(firebaseConfig);

    const auth = getAuth(app);

    const googleProvider = new GoogleAuthProvider();

    window.currentUser = null;

    const isGmail = (email) => email.toLowerCase().endsWith('@gmail.com');

    let generatedCode = null;

    let pendingAction = null;

    // =========================
    // AUTH STATE CHANGES
    // =========================

    onAuthStateChanged(auth, (user) => {

        window.currentUser = user;

        const navAuthBtn = document.getElementById('nav-auth-btn');

        const navProfileBtn = document.getElementById('nav-profile-btn');

        if (user) {

            navAuthBtn.classList.add('hidden');

            navProfileBtn.classList.remove('hidden');

            document.getElementById('displayEmail').innerText = user.email;

            document.getElementById('displayUid').innerText = "UID: " + user.uid;

            if(localStorage.getItem('activeSubscription')){

                document.getElementById('profileCancelSub').style.display = 'block';
            }

        } else {

            navAuthBtn.classList.remove('hidden');

            navProfileBtn.classList.add('hidden');

            document.getElementById('profileCancelSub').style.display = 'none';
        }

        checkSilentValidation();
    });

    // =========================
    // SIGNUP
    // =========================

    window.signupUser = async function() {

        // Prevent signup while logged in
        if (window.currentUser) {

            alert("You are already logged into an account. Logout before creating another account.");

            return;
        }

        const email = document.getElementById('authEmail').value.trim();

        const password = document.getElementById('authPassword').value;

        const signupBtn = document.getElementById('signup-btn');

        if (!isGmail(email)) {

            alert("Registration requires a valid @gmail.com account.");

            return;
        }

        if (password.length < 6) {

            alert("Password validation failed: minimum length is 6 characters.");

            return;
        }

        signupBtn.disabled = true;

        signupBtn.innerText = "Processing registration...";

        try {

            // Check if email already exists
            const methods = await fetchSignInMethodsForEmail(auth, email);

            if (methods.length > 0) {

                alert("This Gmail address is already registered. Please login instead.");

                signupBtn.disabled = false;

                signupBtn.innerText = "Sign Up";

                return;
            }

            await createUserWithEmailAndPassword(auth, email, password);

            alert("Account provisioned successfully!");

            showPage('main-page');

        } catch (error) {

            console.error(error);

            if (error.code === 'auth/email-already-in-use') {

                alert("This Gmail address is already registered.");

            } else {

                alert(`Registration failed: ${error.message}`);
            }

        } finally {

            signupBtn.disabled = false;

            signupBtn.innerText = "Sign Up";
        }
    }

    // =========================
    // LOGIN
    // =========================

    window.loginUser = async function() {

        const email = document.getElementById('authEmail').value.trim();

        const password = document.getElementById('authPassword').value;

        const loginBtn = document.getElementById('login-btn');

        if (!email || !password) {

            alert("Please fill in all authentication fields.");

            return;
        }

        loginBtn.disabled = true;

        loginBtn.innerText = "Validating...";

        try {

            await signInWithEmailAndPassword(auth, email, password);

            alert("Logged in successfully!");

            showPage('main-page');

        } catch (error) {

            alert(`Authentication failed: ${error.message}`);

        } finally {

            loginBtn.disabled = false;

            loginBtn.innerText = "Login";
        }
    }

    // =========================
    // GOOGLE LOGIN
    // =========================

    window.loginWithGoogle = async function() {

        // Prevent Google login while already logged in
        if (window.currentUser) {

            alert("You are already logged into an account.");

            return;
        }

        try {

            const result = await signInWithPopup(auth, googleProvider);

            const user = result.user;

            // Generate 6-digit code
            generatedCode = Math.floor(100000 + Math.random() * 900000).toString();

            pendingAction = {
                type: "google",
                user: user
            };

            // Send email verification
            await emailjs.send(
                "service_6lw4f1n",
                "template_0m2m3of",
                {
                    to_email: user.email,
                    passcode: generatedCode
                }
            );

            // Hide all containers first
            document.getElementById('google-existing-container').classList.add('hidden');

            document.getElementById('google-new-container').classList.add('hidden');

            document.getElementById('google-update-container').classList.add('hidden');

            // Show verification FIRST
            document.getElementById('verification-container').classList.remove('hidden');

            document.getElementById('verify-code-btn').onclick = verifyGoogleCode;

            alert("Verification code sent to your Gmail.");

        } catch (error) {

            alert(`Google authentication cancelled or failed: ${error.message}`);
        }
    }

    // =========================
    // VERIFY GOOGLE CODE
    // =========================

    async function verifyGoogleCode() {

        const enteredCode = document.getElementById('verificationCodeInput').value.trim();

        if (enteredCode !== generatedCode) {

            alert("Invalid verification code.");

            return;
        }

        document.getElementById('verification-container').classList.add('hidden');

        const user = pendingAction.user;

        const methods = await fetchSignInMethodsForEmail(auth, user.email);

        // Existing account
        if (methods.includes("password")) {

            document.getElementById('google-existing-container').classList.remove('hidden');

        } else {

            document.getElementById('google-new-container').classList.remove('hidden');
        }

        alert("Verification successful.");
    }

    // =========================
    // GOOGLE EXISTING OPTIONS
    // =========================

    window.showGooglePasswordUpdate = function() {

        document.getElementById('google-existing-container').classList.add('hidden');

        document.getElementById('google-update-container').classList.remove('hidden');
    }

    window.continueWithOldPassword = function() {

        alert("Logged in successfully!");

        document.getElementById('google-existing-container').classList.add('hidden');

        showPage('main-page');
    }

    // =========================
    // SAVE NEW PASSWORD
    // =========================

    window.saveGoogleNewPassword = async function() {

        const password = document.getElementById('googleNewPassword').value;

        if (password.length < 6) {

            alert("Password must contain at least 6 characters.");

            return;
        }

        try {

            await updatePassword(auth.currentUser, password);

            alert("Password saved successfully!");

            document.getElementById('google-new-container').classList.add('hidden');

            showPage('main-page');

        } catch (error) {

            alert(error.message);
        }
    }

    // =========================
    // UPDATE PASSWORD
    // =========================

    window.saveGoogleUpdatedPassword = async function() {

        const password = document.getElementById('googleUpdatePassword').value;

        if (password.length < 6) {

            alert("Password must contain at least 6 characters.");

            return;
        }

        try {

            await updatePassword(auth.currentUser, password);

            alert("Password updated successfully!");

            document.getElementById('google-update-container').classList.add('hidden');

            showPage('main-page');

        } catch (error) {

            alert(error.message);
        }
    }

    // =========================
    // CANCEL GOOGLE FLOW
    // =========================

    window.cancelGoogleFlow = function() {

        generatedCode = null;

        pendingAction = null;

        document.getElementById('google-update-container').classList.add('hidden');
    }

    // =========================
    // CANCEL VERIFICATION FLOW
    // =========================

    window.cancelVerificationFlow = function() {

        generatedCode = null;

        pendingAction = null;

        document.getElementById('verification-container').classList.add('hidden');

        document.getElementById('verificationCodeInput').value = '';

        document.getElementById('google-existing-container').classList.add('hidden');

        document.getElementById('google-new-container').classList.add('hidden');

        document.getElementById('google-update-container').classList.add('hidden');
    }

    // =========================
    // LOGOUT
    // =========================

    window.logoutUser = async function() {

        try {

            await signOut(auth);

            alert("Logged out successfully.");

            showPage('main-page');

        } catch (error) {

            alert("Error trying to process your sign-out transaction.");
        }
    }
</script>
