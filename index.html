<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Websites | Premium Development</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- PAYPAL SDK: Replace 'YOUR_CLIENT_ID' with your actual Client ID from developer.paypal.com -->
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_CLIENT_ID&vault=true&intent=subscription"></script>
    
    <style>
        :root {
            --bg: #05070a;
            --accent: #3d5afe;
            --accent-glow: rgba(61, 90, 254, 0.3);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(61, 90, 254, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav { width: 100%; padding: 2rem; display: flex; justify-content: space-between; align-items: center; max-width: 1200px; }
        .nav-container { display: flex; align-items: center; cursor: pointer; }
        .nav-logo-img { height: 70px; filter: drop-shadow(0 0 15px var(--accent-glow)); margin-right: 10px; border-radius: 12px; }
        .logo-text { font-weight: 800; font-size: 1.8rem; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .page-view { width: 100%; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }

        header { text-align: center; padding: 2rem 1rem; }
        header h1 { font-size: 3rem; letter-spacing: -2px; }
        header p { color: var(--text-dim); }

        .billing-toggle { display: flex; gap: 15px; margin: 2rem 0; background: var(--glass); padding: 8px; border-radius: 50px; border: 1px solid var(--glass-border); }
        .toggle-btn { padding: 8px 20px; border-radius: 50px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-weight: 700; transition: 0.3s; }
        .toggle-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 15px var(--accent-glow); }

        .order-card {
            background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 2.5rem; width: 90%; max-width: 600px;
        }

        .tier-selection-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 2rem; }
        .tier-card { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 1.2rem 0.5rem; border-radius: 16px; text-align: center; cursor: pointer; transition: 0.3s; }
        .tier-card.selected { border-color: var(--accent); background: rgba(61, 90, 254, 0.1); }
        .tier-name { display: block; font-weight: 800; font-size: 0.9rem; }
        .tier-price { color: var(--text-dim); font-size: 0.8rem; }

        .input-wrapper { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        input, textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; padding: 1rem; color: white; }

        #paypal-button-container { margin-top: 1.5rem; min-height: 150px; }
        footer { padding: 3rem; color: var(--text-dim); font-size: 0.85rem; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <img src="https://cdn.discordapp.com/attachments/1101409428944724000/1501626773056520413/ChatGPT_Image_May_5_2026_05_15_21_PM.png?ex=69fcc269&is=69fb70e9&hm=6d85bf462ff361fb2de21fdcc3a85046544e4da6dbc71da62a51a2b9a0ba537c&" alt="OG Logo" class="nav-logo-img">
            <div class="logo-text">Websites</div>
        </div>
    </nav>

    <main class="page-view">
        <header>
            <h1>Scale Your Brand</h1>
            <p>Select your tier and subscribe to lock in your project.</p>
        </header>

        <div class="billing-toggle">
            <button class="toggle-btn active" id="monthlyBtn" onclick="setBilling('monthly')">Monthly</button>
            <button class="toggle-btn" id="yearlyBtn" onclick="setBilling('yearly')">Yearly (-20%)</button>
        </div>

        <div class="order-card">
            <form id="orderForm">
                <label>Select Plan Tier</label>
                <div class="tier-selection-grid">
                    <div class="tier-card selected" onclick="selectTier('Basic', this)" data-m="19.99" data-y="15.99">
                        <span class="tier-name">Basic</span>
                        <span class="tier-price">$19.99</span>
                    </div>
                    <div class="tier-card" onclick="selectTier('Advanced', this)" data-m="39.99" data-y="31.99">
                        <span class="tier-name">Advanced</span>
                        <span class="tier-price">$39.99</span>
                    </div>
                    <div class="tier-card" onclick="selectTier('Premium', this)" data-m="79.99" data-y="63.99">
                        <span class="tier-name">Premium</span>
                        <span class="tier-price">$79.99</span>
                    </div>
                </div>

                <div class="input-wrapper">
                    <label>Full Name</label>
                    <input type="text" id="clientName" placeholder="Enter your name" required>
                </div>
                <div class="input-wrapper">
                    <label>Email Address</label>
                    <input type="email" id="clientEmail" placeholder="email@example.com" required>
                </div>
                <div class="input-wrapper">
                    <label>Project Vision</label>
                    <textarea id="projectVision" rows="3" placeholder="Describe your goals..."></textarea>
                </div>
                
                <div id="paypal-button-container"></div>
            </form>
        </div>
    </main>

    <footer>&copy; 2026 OG Websites Development.</footer>

    <script>
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1501632580058091570/OHmK0Vr6ZqpfQ5RtS9obRk6ulU5fj_L8xr_80LI9vlSKgmXV1FHIHDZEHRqG4iouNdPQ";
        
        // REPLACE THESE WITH YOUR ACTUAL PLAN IDs FROM PAYPAL
        const PLAN_IDS = {
            monthly: {
                Basic: "P-YOUR_MONTHLY_BASIC_ID",
                Advanced: "P-YOUR_MONTHLY_ADVANCED_ID",
                Premium: "P-YOUR_MONTHLY_PREMIUM_ID"
            },
            yearly: {
                Basic: "P-YOUR_YEARLY_BASIC_ID",
                Advanced: "P-YOUR_YEARLY_ADVANCED_ID",
                Premium: "P-YOUR_YEARLY_PREMIUM_ID"
            }
        };

        let currentTier = 'Basic';
        let currentCycle = 'monthly';

        function selectTier(tier, element) {
            currentTier = tier;
            document.querySelectorAll('.tier-card').forEach(card => card.classList.remove('selected'));
            element.classList.add('selected');
        }

        function setBilling(cycle) {
            currentCycle = cycle;
            document.getElementById('monthlyBtn').classList.toggle('active', cycle === 'monthly');
            document.getElementById('yearlyBtn').classList.toggle('active', cycle === 'yearly');
            
            document.querySelectorAll('.tier-card').forEach(card => {
                const price = cycle === 'monthly' ? card.dataset.m : card.dataset.y;
                card.querySelector('.tier-price').innerText = `$${price}`;
            });
        }

        paypal.Buttons({
            style: { shape: 'pill', color: 'blue', layout: 'vertical', label: 'subscribe' },
            createSubscription: function(data, actions) {
                // Ensure form fields are valid before opening PayPal
                const name = document.getElementById('clientName').value;
                const email = document.getElementById('clientEmail').value;
                
                if (!name || !email) {
                    alert("Please provide your name and email to proceed.");
                    return;
                }
                
                return actions.subscription.create({
                    'plan_id': PLAN_IDS[currentCycle][currentTier]
                });
            },
            onApprove: function(data, actions) {
                // Sent to Discord ONLY after payment is confirmed
                const payload = {
                    username: "OG Sub Bot",
                    embeds: [{
                        title: "✅ NEW ACTIVE SUBSCRIPTION",
                        color: 4021246,
                        fields: [
                            { name: "Client", value: document.getElementById('clientName').value, inline: true },
                            { name: "Plan", value: `${currentTier} (${currentCycle})`, inline: true },
                            { name: "Email", value: document.getElementById('clientEmail').value },
                            { name: "Subscription ID", value: data.subscriptionID },
                            { name: "Vision", value: document.getElementById('projectVision').value || "No details" }
                        ],
                        timestamp: new Date()
                    }]
                };

                fetch(DISCORD_WEBHOOK, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });

                alert("Success! Your subscription is active. We will reach out to your email shortly.");
                document.getElementById('orderForm').reset();
            },
            onError: function(err) {
                console.error(err);
                alert("Payment could not be processed. Please check your details.");
            }
        }).render('#paypal-button-container');
    </script>
</body>
</html>
